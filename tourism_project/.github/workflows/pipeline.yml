
name: ML Pipeline CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.9'

    - name: Install ML dependencies
      run: |
        pip install pandas scikit-learn joblib huggingface_hub datasets

    - name: Run Data Preparation (Simulated)
      # In a real scenario, this would call a script that performs data loading, cleaning, splitting etc.
      # For example: python tourism_project/scripts/data_preparation.py
      run: echo "Data preparation steps would run here."

    - name: Run Model Training and Evaluation (Simulated)
      # In a real scenario, this would call a script that trains, evaluates, and saves model/preprocessor.
      # For example: python tourism_project/scripts/model_training.py
      run: echo "Model training and evaluation steps would run here."

    - name: Upload Model and Preprocessor to Hugging Face Model Hub (Simulated)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} # Ensure this secret is set in GitHub
        HF_USERNAME: Premk2025 # Your HF username
      # This step would run a Python script that uses huggingface_hub to upload artifacts.
      # For example: python tourism_project/scripts/upload_model_hf.py
      run: echo "Uploading model artifacts to Hugging Face simulated."

  auto-push-artifacts:
    runs-on: ubuntu-latest
    needs: ml-pipeline # This job runs after ml-pipeline to push updated artifacts
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # This token is required to push changes back to the repository.
          # It should be a PAT with 'repo' scope, or a deploy key, configured as ACTIONS_DEPLOY_KEY.
          token: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          fetch-depth: 0 # Fetch all history for git diff to work reliably

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main
          git branch -M main # Ensure local branch is main

      - name: Add and commit artifacts if changed
        id: commit_artifacts
        run: |
          # Change to the project directory to correctly stage files
          cd tourism_project

          # Add the specific files to staging
          git add model_building/best_decision_tree_model.joblib
          git add model_building/preprocessor.joblib
          git add data/wellness_tourism.csv # Assuming this file might also be updated by ml-pipeline

          # Check if there are any changes to commit
          if ! git diff --cached --quiet; then
            echo "Changes detected, committing and pushing artifacts."
            # The [skip ci] tag prevents this commit from re-triggering the CI/CD pipeline, avoiding infinite loops.
            git commit -m "[skip ci] chore: Update model and data artifacts"
            git push origin main
          else
            echo "No changes to model or data artifacts, skipping commit and push."
          fi

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: auto-push-artifacts # This job depends on artifacts being pushed, even if no changes were made.
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./tourism_project/deployment
        push: true
        tags: your-docker-username/wellness-tourism-app:latest

  deploy-to-cloudrun:
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    environment: production # Define an environment in GitHub for secrets management
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: wellness-tourism-api
        image: your-docker-username/wellness-tourism-app:latest
        region: us-central1 # Change to your desired region
        # Add other Cloud Run configuration as needed, e.g., --platform managed, --allow-unauthenticated
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
