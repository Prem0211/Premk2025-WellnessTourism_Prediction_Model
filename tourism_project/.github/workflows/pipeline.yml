
name: ML Pipeline CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install ML dependencies
      run: |
        pip install pandas scikit-learn joblib huggingface_hub datasets

    - name: Run Data Preparation (Simulated)
      run: echo "Data preparation steps would run here."

    - name: Run Model Training and Evaluation (Simulated)
      run: echo "Model training and evaluation steps would run here."

    - name: Upload Model and Preprocessor to Hugging Face Model Hub (Simulated)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_USERNAME: Premk2025
      run: echo "Uploading model artifacts to Hugging Face simulated."

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: ml-pipeline

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: ./tourism_project/deployment
        push: true
        tags: your-docker-username/wellness-tourism-app:latest

  deploy-to-cloudrun:
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Google Auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v1
      with:
        service: wellness-tourism-api
        image: your-docker-username/wellness-tourism-app:latest
        region: us-central1
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
