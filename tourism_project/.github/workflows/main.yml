
name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: ./tourism_project/deployment
        push: true
        tags: your-docker-username/wellness-tourism-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Google Auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v1
      with:
        service: wellness-tourism-api
        image: your-docker-username/wellness-tourism-app:latest
        region: us-central1 # Change to your desired region
        # Add other Cloud Run configuration as needed, e.g., --platform managed, --allow-unauthenticated
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
